<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px 48px;
            width: 420px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 1.8em;
            color: #fff;
            margin-bottom: 8px;
        }

        .subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 0.9em;
            margin-bottom: 28px;
        }

        .lives {
            font-size: 1.6em;
            margin-bottom: 24px;
            letter-spacing: 4px;
        }

        .feedback-emoji {
            font-size: 3.5em;
            min-height: 64px;
            margin-bottom: 12px;
            transition: transform 0.3s;
        }

        .feedback-emoji.pop {
            animation: pop 0.3s ease;
        }

        @keyframes pop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        .message {
            font-size: 1.1em;
            font-weight: 600;
            min-height: 28px;
            margin-bottom: 8px;
            color: #fff;
        }

        .hint {
            font-size: 0.9em;
            color: rgba(255,255,255,0.55);
            min-height: 22px;
            margin-bottom: 28px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="number"] {
            flex: 1;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 1.1em;
            outline: none;
            transition: border 0.2s;
            text-align: center;
        }

        input[type="number"]:focus {
            border-color: #e94560;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
        }

        button.guess-btn {
            padding: 14px 20px;
            border-radius: 12px;
            border: none;
            background: #e94560;
            color: #fff;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button.guess-btn:hover { background: #c73652; }
        button.guess-btn:active { transform: scale(0.97); }
        button.guess-btn:disabled {
            background: rgba(255,255,255,0.15);
            cursor: not-allowed;
        }

        .previous {
            font-size: 0.85em;
            color: rgba(255,255,255,0.4);
            min-height: 22px;
            margin-bottom: 20px;
            word-wrap: break-word;
        }

        button.restart-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            background: transparent;
            color: #fff;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: none;
        }

        button.restart-btn:hover { background: rgba(255,255,255,0.1); }

        .win .feedback-emoji { animation: bounce 0.6s infinite alternate; }

        @keyframes bounce {
            from { transform: translateY(0); }
            to   { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="card" id="card">
        <h1>🔢 Guess the Number</h1>
        <p class="subtitle">A number between 1 and 100 — can you crack it?</p>

        <div class="lives" id="lives"></div>
        <div class="feedback-emoji" id="emoji">🤔</div>
        <div class="message" id="message">Make your first guess!</div>
        <div class="hint" id="hint">You have 10 chances.</div>

        <div class="input-row">
            <input type="number" id="number" min="1" max="100" placeholder="1 – 100">
            <button class="guess-btn" id="guessBtn">Guess!</button>
        </div>

        <div class="previous" id="previous"></div>
        <button class="restart-btn" id="restartBtn">🔄 Play Again</button>
    </div>

    <script>
        const MAX_TRIES = 10;

        let secret, tries, guesses, gameActive;

        const input       = document.getElementById('number');
        const guessBtn    = document.getElementById('guessBtn');
        const restartBtn  = document.getElementById('restartBtn');
        const livesEl     = document.getElementById('lives');
        const emojiEl     = document.getElementById('emoji');
        const messageEl   = document.getElementById('message');
        const hintEl      = document.getElementById('hint');
        const previousEl  = document.getElementById('previous');
        const card        = document.getElementById('card');

        function startGame() {
            secret     = Math.floor(Math.random() * 100) + 1;
            tries      = 0;
            guesses    = [];
            gameActive = true;

            livesEl.textContent   = '❤️'.repeat(MAX_TRIES);
            emojiEl.textContent   = '🤔';
            messageEl.textContent = 'Make your first guess!';
            hintEl.textContent    = `You have ${MAX_TRIES} chances.`;
            previousEl.textContent = '';
            input.value           = '';
            input.disabled        = false;
            guessBtn.disabled     = false;
            restartBtn.style.display = 'none';
            card.classList.remove('win');
            input.focus();
        }

        function getEmojiForDistance(diff) {
            if (diff <= 2)  return '🔥';
            if (diff <= 7)  return '😰';
            if (diff <= 15) return '😬';
            if (diff <= 30) return '🧊';
            return '🌨️';
        }

        function getHintText(guess) {
            const diff = Math.abs(guess - secret);
            if (diff <= 2)  return 'Scorching hot! So close!';
            if (diff <= 7)  return 'Very warm! Getting there!';
            if (diff <= 15) return 'Lukewarm... try harder!';
            if (diff <= 30) return 'Pretty cold... think bigger!';
            return 'Ice cold! Way off!';
        }

        function popEmoji() {
            emojiEl.classList.remove('pop');
            void emojiEl.offsetWidth; // reflow to restart animation
            emojiEl.classList.add('pop');
        }

        function submitGuess() {
            if (!gameActive) return;

            const num = parseInt(input.value, 10);
            if (!num || num < 1 || num > 100) {
                messageEl.textContent = '⚠️ Enter a number between 1 and 100!';
                input.value = '';
                input.focus();
                return;
            }

            if (guesses.includes(num)) {
                messageEl.textContent = `You already tried ${num}! Pick another.`;
                input.value = '';
                input.focus();
                return;
            }

            tries++;
            guesses.push(num);
            input.value = '';

            const remaining = MAX_TRIES - tries;
            livesEl.textContent = '❤️'.repeat(remaining) + '🖤'.repeat(tries);

            previousEl.textContent = 'Previous: ' + guesses.join(', ');

            if (num === secret) {
                emojiEl.textContent   = '🎉';
                messageEl.textContent = `You got it! The number was ${secret}!`;
                hintEl.textContent    = tries === 1
                    ? '🏆 First try! Incredible!'
                    : `Solved in ${tries} guess${tries > 1 ? 'es' : ''}!`;
                card.classList.add('win');
                endGame();
                return;
            }

            if (tries >= MAX_TRIES) {
                emojiEl.textContent   = '💀';
                messageEl.textContent = `Game over! It was ${secret}.`;
                hintEl.textContent    = 'Better luck next time!';
                endGame();
                return;
            }

            const direction = num < secret ? '📈 Go higher!' : '📉 Go lower!';
            emojiEl.textContent   = getEmojiForDistance(Math.abs(num - secret));
            messageEl.textContent = direction;
            hintEl.textContent    = getHintText(num) + ` (${remaining} left)`;
            popEmoji();
            input.focus();
        }

        function endGame() {
            gameActive = false;
            input.disabled = true;
            guessBtn.disabled = true;
            restartBtn.style.display = 'block';
        }

        guessBtn.addEventListener('click', submitGuess);
        restartBtn.addEventListener('click', startGame);
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') submitGuess();
        });

        startGame();
    </script>
</body>
</html>
